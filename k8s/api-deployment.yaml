apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-api
  namespace: demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: node-api

  template:
    metadata:
      labels:
        app: node-api

    spec:
      containers:
      - name: node-api
        image: bharathiacr123.azurecr.io/node-api:02a56b280abb40aff62572a983252b5fc6c3e873

        ports:
        - containerPort: 5000