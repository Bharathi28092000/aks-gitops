apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-ui
  namespace: demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: react-ui

  template:
    metadata:
      labels:
        app: react-ui

    spec:
      containers:
      - name: react-ui
        image: bharathiacr123.azurecr.io/react-ui:44e2b004d67467bb518f214c4b70de53b8d3d21f

        ports:
        - containerPort: 80