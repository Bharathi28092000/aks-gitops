apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-ui
  namespace: demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: react-ui

  template:
    metadata:
      labels:
        app: react-ui

    spec:
      containers:
      - name: react-ui
        image: bharathiacr123.azurecr.io/react-ui:02a56b280abb40aff62572a983252b5fc6c3e873

        ports:
        - containerPort: 80