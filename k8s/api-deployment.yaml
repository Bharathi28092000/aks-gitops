apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-api
  namespace: demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: node-api

  template:
    metadata:
      labels:
        app: node-api

    spec:
      containers:
      - name: node-api
        image: bharathiacr123.azurecr.io/node-api:7a958c8a1f72346b8c15b2c6f9d90d9ac8e7a8c0

        ports:
        - containerPort: 5000